<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - DataCorp</title>

    <!-- DARK MODE INIT (NO FLICKER + CONSISTENT) -->
    <script>
        try {
            const savedTheme = localStorage.getItem("darkMode");

            if (savedTheme === "true") {
                document.documentElement.classList.add("dark");
            } else if (savedTheme === null) {
                if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
                    document.documentElement.classList.add("dark");
                }
            }
        } catch (e) {
            console.warn("Dark mode init failed:", e);
        }
    </script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <nav>
        <h1>DataCorp</h1>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="features.html">Features</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>

        <!-- Added type for consistency -->
        <button type="button" onclick="toggleDarkMode()">🌙</button>
    </nav>
</header>

<!-- HERO -->
<section class="hero">
    <h2>Contact Us</h2>
    <p>Let’s build something great together</p>
</section>

<!-- FORM -->
<div class="container">
    <div class="section">
        <h3>Get in Touch</h3>

        <form action="https://formsubmit.co/abdulhannan.am97@gmail.com" method="POST">

            <input type="text" name="name" placeholder="Your Name" required>

            <input type="email" name="email" placeholder="Your Email" required>

            <textarea name="message" rows="5" placeholder="Your Message" required></textarea>

            <!-- Optional settings -->
            <input type="hidden" name="_subject" value="New Contact Form Submission">
            <input type="hidden" name="_captcha" value="false">

            <!-- Optional UX improvement -->
            <input type="hidden" name="_next" value="thankyou.html">

            <button type="submit">Send Message</button>
        </form>
    </div>
</div>

<footer>
    <p>&copy; 2024 DataCorp. All rights reserved.</p>
</footer>

<!-- GLOBAL SCRIPT -->
<script src="script.js"></script>

</body>
</html>
